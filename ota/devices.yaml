common:
  commands:
    - name: Reboot
      description: Restarts the device
      cmd: "reboot"

projects:
  - name: "Smoke detector"
    pio_project: project_esp8266_smoke
    commands:
      - name: Clear config
        description: Deletes the stored configuration file
        cmd: "clearConfig"
    devices: []   # No hardware deployed yet; the project entry is kept on purpose.

  - name: "Radiation detector"
    pio_project: project_esp8266_rad
    devices:
      - mac: c82b96034710
        friendly_name: "Home BP"
        server_config:
          haDiscovery: true
        files:
          - name: "CA certificate upload"
            local_path: files/common/mosq-ca.crt
            device_path: /config/mosq-ca.crt
          - name: "Server configuration upload"
            render: server_json
            device_path: /config/server.json
          - name: "Tube configuration upload"
            local_path: files/c82b96034710/tube.json
            device_path: /config/tube.json
      - mac: cc50e30872d3
        friendly_name: "Home H"
        server_config:
          haDiscovery: true
        files:
          - name: "CA certificate upload"
            local_path: files/common/mosq-ca.crt
            device_path: /config/mosq-ca.crt
          - name: "Server configuration upload"
            render: server_json
            device_path: /config/server.json
          - name: "Tube configuration upload"
            local_path: files/cc50e30872d3/tube.json
            device_path: /config/tube.json

  - name: "CAN gateway"
    pio_project: project_esp32_can
    devices:
      - mac: fcf5c401bd83
        friendly_name: "Home BP living room"
        server_config:
          haDiscovery: true
        files:
          - name: "CA certificate upload"
            local_path: files/common/mosq-ca.crt
            device_path: /config/mosq-ca.crt
          - name: "Server configuration upload"
            render: server_json
            device_path: /config/server.json
          - name: "CAN alert firmware upload"
            local_path: ../.pio/build/nanoatmega328_alert/firmware.bin
            device_path: /canAlertFw.bin

  - name: "Thermometer"
    pio_project: project_esp8266_thermo
    devices:
      - mac: bcddc2b622c9
        friendly_name: "Home BP"
        server_config:
          haDiscovery: true
        files:
          - name: "CA certificate upload"
            local_path: files/common/mosq-ca.crt
            device_path: /config/mosq-ca.crt
          - name: "Server configuration upload"
            render: server_json
            device_path: /config/server.json
      - mac: 40f52033765d
        friendly_name: "Test2"
        server_config:
          haDiscovery: true
        files:
          - name: "CA certificate upload"
            local_path: files/common/mosq-ca.crt
            device_path: /config/mosq-ca.crt
          - name: "Server configuration upload"
            render: server_json
