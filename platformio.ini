; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:nanoatmega328new]
platform = atmelavr
board = nanoatmega328new
framework = arduino

check_tool = cppcheck, clangtidy
check_skip_packages = yes
check_patterns = src/*
check_flags = 
    cppcheck: --suppress=*:*.pio\* --suppress=noExplicitConstructor --suppress=unusedFunction ;--suppress=*:*lib\ab.cpp
    clangtidy: --checks=clang-analyzer-*,readability-*,performance-*,hicpp-*,bugprone-*,modernize-*,-modernize-use-trailing-return-type ;--suppress=readability-magic-numbers

; change microcontroller
board_build.mcu = atmega328p

; change MCU frequency
board_build.f_cpu = 16000000L

; set upload speed
upload_speed = 115200

; serial port to upload code
upload_port = COM4

; serial monitor port
monitor_port = COM4

; serial monitor speed
monitor_speed = 115200

; serial monitor setup
monitor_filters = time, default, log2file

; libraries
lib_deps = 
    CANDriver=https://github.com/MrNoname3/arduino-CAN.git
    fastled/FastLED@^3.5.0
    arsadri/PushButton Event Modelling Library@^1.0.0
    DFPlayerMiniFast=https://github.com/MrNoname3/DFPlayerMiniFast
    