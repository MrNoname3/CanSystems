; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:nanoatmega328new]
platform = atmelavr
board = nanoatmega328new
framework = arduino

platform_packages = platformio/tool-avrdude@^1.70200.0

check_tool = cppcheck, clangtidy
check_skip_packages = yes
check_src_filters = src/*
check_flags = 
    cppcheck: --suppress=*:*.pio\* --suppress=noExplicitConstructor --suppress=unusedFunction ;--suppress=*:*lib\ab.cpp
    clangtidy: --checks=clang-analyzer-*,readability-*,performance-*,hicpp-*,bugprone-*,modernize-*,-modernize-use-trailing-return-type ;--suppress=readability-magic-numbers

extra_scripts = 
    pre:getCommitHash.py
    post:elfToBin.py

board_build.mcu = atmega328p            ; change microcontroller
board_build.f_cpu = 16000000L           ; change MCU frequency

;upload_protocol = arduino                       ; set upload protocol -> Serial upload via Optiboot / Urboot bootloader
upload_protocol = urclock                       ; set upload protocol -> Serial upload via Urboot bootloader
;upload_protocol = usbasp                        ; set upload protocol -> ISP upload via USBAsp programmer
;upload_protocol = avrisp                        ; set upload protocol -> ISP upload via Arduino as ISP programmer

upload_speed = 115200           ; set upload speed
upload_port = COM3              ; serial port to upload code

monitor_port = COM3             ; serial monitor port
monitor_speed = 115200          ; serial monitor speed
monitor_filters = time, default, log2file   ; serial monitor setup

; build options
build_flags =
    ;-D DEBUG_ON

; libraries
lib_deps = 
    CANDriver=https://github.com/MrNoname3/arduino-CAN.git
    WS2812Driver=makuna/NeoPixelBus@^2.7.6
    PushButton=arsadri/PushButton Event Modelling Library@^1.0.0
    DFPlayerMiniFast=https://github.com/MrNoname3/DFPlayerMiniFast
    SI7021Driver=https://github.com/MrNoname3/SI7021.git#dev
    SPIFlash=lowpowerlab/SPIFlash@^101.1.3