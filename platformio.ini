; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

;****************** PLATFORMIO ******************
[platformio]
default_envs =
  nanoatmega328_alert
  nanoatmega328_irrigation
  project_esp8266_rad
  project_esp8266_smoke
  project_esp8266_thermo
  project_esp32_can
  native_test

;****************** ENV ******************
[env]
framework = arduino
monitor_speed = 115200                                  ; serial monitor speed
monitor_filters = time, default, log2file               ; serial monitor setup
check_tool = cppcheck, clangtidy
check_severity = high, medium, low
check_skip_packages = yes
check_src_filters = +<src/> +<lib/>
check_flags =
  cppcheck: --enable=warning,style,performance,portability --inline-suppr --suppress=*:*.pio/* --suppress=noExplicitConstructor --suppress=unusedFunction
  clangtidy: --extra-arg=-std=c++17 --checks=clang-analyzer-*,readability-*,performance-*,bugprone-*,modernize-*,-modernize-use-trailing-return-type,-modernize-avoid-c-arrays,-readability-magic-numbers,-readability-identifier-length,-bugprone-easily-swappable-parameters,-bugprone-branch-clone,-modernize-deprecated-headers,-modernize-use-auto
extra_scripts =
  pre:scripts/git_commit_info.py
test_ignore =                                                    ; native-only tests
  test_pubsubclient_*
  test_crc16
  test_circularbuffer
  test_otaregistry
  test_taskhandler
  test_base64
  test_common
  test_ota
  test_otacanframe
  test_canhandlerbase
  test_eepromhandler
  test_performance
  test_pushbutton
  test_multiplexer
  test_pushbuttonhandler
  test_ambientSensor
  test_mqttTopics
  test_haDiscovery
  test_pcf8574
  test_pumpControl
  test_moistureReader
  test_configHandler
  test_dataTransfer
  test_mqttCommon
  test_canMqttGateway
  test_canAlertDriver
  test_rgbledwrapper
  test_dfplayer
  test_radiation
  test_mqttthermometer
  test_externalsensor
  test_debugledhandler
  test_rfhandler
; build options
build_flags =
  '-D BUILD_ENV_NAME="$PIOENV"'
  '-D MONITOR_BAUD=${env.monitor_speed}'
  '-D GIT_COMMIT_HASH=$GIT_COMMIT_HASH'
  '-D GIT_COMMIT_COUNT=$GIT_COMMIT_COUNT'
  '-D GIT_DIRTY=$GIT_DIRTY'
  '-D MASTER_CAN_ADDRESS=10U'
  ;'-D NEW_CAN_ADDRESS = 26U'
  '-D MQTT_MAX_PACKET_SIZE=1024'
  -Wall
  -Wextra
  -Werror

;****************** ENV:NANOATMEGA328_BASE ******************
[env:nanoatmega328_base]
platform = atmelavr
board = nanoatmega328new
platform_packages = platformio/tool-avrdude@^1.70200.0
board_build.mcu = atmega328p                    ; Microcontroller
board_build.f_cpu = 16000000L                   ; MCU frequency
monitor_port =                                  ; serial monitor port
upload_port =                                   ; serial port to upload code
upload_speed = 115200                           ; set upload speed
;upload_protocol = arduino                       ; set upload protocol -> Serial upload via Optiboot / Urboot bootloader
upload_protocol = urclock                       ; set upload protocol -> Serial upload via Urboot bootloader
;upload_protocol = usbasp                        ; set upload protocol -> ISP upload via USBAsp programmer
;upload_protocol = avrisp                        ; set upload protocol -> ISP upload via Arduino as ISP programmer
;board_upload.maximum_size = 31744               ; Our bootloader section is only 1024byte. Real available flash size is: 32Kb - 1Kb.
board_upload.maximum_size = 32256               ; Our bootloader section is only 512byte. Real available flash size is: 32Kb - 0.5Kb.
extra_scripts =
  ${env.extra_scripts}
  pre:scripts/patch_new_lib.py
  post:scripts/elf_to_bin.py
; build options
build_unflags =
  -std=gnu++11
build_flags =
  ${env.build_flags}
  -std=c++17
  '-D PROGRAM_MEMORY_SIZE=${env:nanoatmega328_base.board_upload.maximum_size}'
build_src_filter =
  -<*>
  +<main.cpp>
lib_ignore =
  connectivity
; libraries
lib_deps =

;****************** ENV:NANOATMEGA328_BOOTLOADER_URBOOT771 ******************
[env:nanoatmega328_bootloader_urboot771]
extends = env:nanoatmega328_base
upload_protocol = usbasp
;https://eleccelerator.com/fusecalc/fusecalc.php?chip=atmega328p&LOW=FF&HIGH=D4&EXTENDED=FC&LOCKBIT=CF
board_fuses.lfuse = 0xFF    ;original: FF
board_fuses.hfuse = 0xD4    ;original: DA
board_fuses.efuse = 0xFC    ;original: FD
;board_fuses.lock = 0xCF     ;original: 0F
board_bootloader.file = ./bootloader/urboot_771_m328p_1s_x16m0_115k2_uart0_rxd0_txd1_led+d4_csb0_dual_ee_ce_hw_stk500.hex
board_bootloader.lfuse = 0xFF           ;original: FF
board_bootloader.hfuse = 0xD4           ;original: DA
board_bootloader.efuse = 0xFC           ;original: FD
board_bootloader.lock_bits = 0xCF       ;original: 0F
board_bootloader.unlock_bits = 0xFF     ;original: 3F

;****************** ENV:NANOATMEGA328_BOOTLOADER_URBOOT800 ******************
[env:nanoatmega328_bootloader_urboot800]
extends = env:nanoatmega328_base
upload_protocol = usbasp
;https://eleccelerator.com/fusecalc/fusecalc.php?chip=atmega328p&LOW=FF&HIGH=D6&EXTENDED=FC&LOCKBIT=CF
board_fuses.lfuse = 0xFF    ;original: FF
board_fuses.hfuse = 0xD6    ;original: DA
board_fuses.efuse = 0xFC    ;original: FD
;board_fuses.lock = 0xCF     ;original: 0F
board_bootloader.file = ./bootloader/urboot_800_m328p_1s_x16m0_115k2_uart0_rxd0_txd1_led+d4_csb0_dual_ee_ce_hw.hex
board_bootloader.lfuse = 0xFF           ;original: FF
board_bootloader.hfuse = 0xD6           ;original: DA
board_bootloader.efuse = 0xFC           ;original: FD
board_bootloader.lock_bits = 0xCF       ;original: 0F
board_bootloader.unlock_bits = 0xFF     ;original: 3F

;****************** ENV:NANOATMEGA328_ALERT ******************
[env:nanoatmega328_alert]
extends = env:nanoatmega328_base
build_flags =
  ${env:nanoatmega328_base.build_flags}
build_src_filter =
  -<*>
  +<main_atmega328_alert.cpp>
lib_deps =
  ${env:nanoatmega328_base.lib_deps}
  WS2812Driver=makuna/NeoPixelBus@^2.7.6

;****************** ENV:NANOATMEGA328_IRRIGATION ******************
[env:nanoatmega328_irrigation]
extends = env:nanoatmega328_base
build_flags =
  ${env:nanoatmega328_base.build_flags}
build_src_filter =
  -<*>
  +<main_atmega328_irrigation.cpp>
lib_deps =
  ${env:nanoatmega328_base.lib_deps}
  WS2812Driver=makuna/NeoPixelBus@^2.7.6

;****************** ENV:ESP8266_BASE ******************
[env:esp8266_base]
platform = espressif8266
board = d1_mini
platform_packages = platformio/framework-arduinoespressif8266@^3.30102.0
board_build.mcu = esp8266                       ; Microcontroller
board_build.f_cpu = 160000000L                  ; MCU frequency
board_build.f_flash = 80000000L                 ; External SPI FLASH speed
board_build.flash_mode = qio                    ; SPI FLASH uplad method
monitor_port =                                  ; serial monitor port
upload_port =                                   ; serial port to upload code
upload_speed = 921600                           ; set upload speed
upload_protocol = esptool                       ; set upload protocol -> Serial upload
upload_resetmethod = nodemcu
board_build.filesystem = littlefs               ; Used filesystem on SPI's FS space
board_build.ldscript = eagle.flash.4m2m.ld      ; FLASH partitioning: sketch-1019KB, OTA-1028KB, FS-2024KB
monitor_filters =
  ${env.monitor_filters}
  esp8266_exception_decoder
extra_scripts =
  ${env.extra_scripts}
  pre:scripts/patch_elf2bin.py
build_flags =
  ${env.build_flags}
  ;-D ATOMIC_FS_UPDATE
  -D PIO_FRAMEWORK_ARDUINO_LWIP2_HIGHER_BANDWIDTH
  -D PIO_FRAMEWORK_ARDUINO_MMU_CACHE16_IRAM48
  ;-D BEARSSL_SSL_BASIC  ; disabled for full ECDSA support — restore if heap is insufficient
  -D VTABLES_IN_FLASH
  ;-D DEBUG_ESP_PORT=Serial
  ;-D DEBUG_ESP_SSL
  ;-D DEBUG_ESP_TLS_MEM
  ;-D DEBUG_ESP_HTTP_CLIENT
  ;-D DEBUG_ESP_HTTP_SERVER
  ;-D DEBUG_ESP_CORE
  ;-D DEBUG_ESP_WIFI
  ;-D DEBUG_ESP_HTTP_UPDATE
  ;-D DEBUG_ESP_UPDATER
  ;-D DEBUG_ESP_OTA
build_src_filter =
  -<*>
  +<main.cpp>

;****************** ENV:PROJECT_ESP8266_RAD ******************
[env:project_esp8266_rad]
extends = env:esp8266_base
;build_type = debug
build_flags =
  ${env:esp8266_base.build_flags}
; libraries
lib_deps =
  JSONHandler=bblanchon/ArduinoJson@^7.1.0
build_src_filter =
  -<*>
  +<main_esp8266_rad.cpp>

;****************** ENV:PROJECT_ESP8266_SMOKE ******************
[env:project_esp8266_smoke]
extends = env:esp8266_base
;build_type = debug
build_flags =
  ${env:esp8266_base.build_flags}
; libraries
lib_deps =
  JSONHandler=bblanchon/ArduinoJson@^7.1.0
  ADS1115=robtillaart/ADS1X15@^0.5.0
  MQ135GasSensor=miguel5612/MQUnifiedsensor@^3.0.0
build_src_filter =
  -<*>
  +<main_esp8266_smoke.cpp>

;****************** ENV:PROJECT_ESP8266_THERMO ******************
[env:project_esp8266_thermo]
extends = env:esp8266_base
build_flags =
  ${env:esp8266_base.build_flags}
; OneWireNg replaces paulstoffregen/OneWire as a maintained drop-in under DallasTemperature: it
; builds clean under -Werror (paulstoffregen does not), and the ESP8266 has no RMT, so the 1-Wire
; bus is bit-banged either way. lib_ignore OneWire so DallasTemperature picks up OneWireNg's drop-in.
lib_deps =
  JSONHandler=bblanchon/ArduinoJson@^7.1.0
  DallasTemperature=milesburton/DallasTemperature@^3.11.0
  OneWireDriver=pstolarz/OneWireNg@^0.14.1
lib_ignore =
  OneWire
build_src_filter =
  -<*>
  +<main_esp8266_thermo.cpp>

;****************** ENV:ESP32_BASE ******************
[env:esp32_base]
platform = espressif32
board = lolin32
platform_packages =
board_build.mcu = esp32                         ; Microcontroller
board_build.f_cpu = 240000000L                  ; Set CPU frequency to 240MHz.
board_build.f_flash = 80000000L                 ; Set flash frequency to 80MHz.
board_build.flash_mode = dio                    ; Flash chip interface mode.
board_upload.flash_size = 4MB                   ; Set flash size.
board_upload.maximum_size = 4194304
monitor_port =                                  ; Select serial monitor port.
upload_port =                                   ; Select serial port to upload code.
upload_speed = 921600                           ; Set upload speed.
upload_protocol = esptool                       ; Serial->esptool, debugger->esp-prog
board_build.filesystem = littlefs               ; Used filesystem on SPI's FS space
board_build.partitions = default.csv
monitor_filters =
  ${env.monitor_filters}
  esp32_exception_decoder
build_unflags =
  -std=gnu++11
build_flags =
  ${env.build_flags}
  -std=gnu++17
  -DCORE_DEBUG_LEVEL=1                          ; Debug level -> 0:none, 1:error, 2:warn, 3:info, 4:debug, 5:verbose
lib_ignore =
  ota
debug_tool = esp-prog                           ; Debugger options.
debug_init_break = tbreak setup                 ; It stops the program at "void setup()" function.
debug_speed = 20000                             ; Fixed debug speed in kHz.
build_src_filter =
  -<*>
  +<main.cpp>

;****************** ENV:PROJECT_ESP32_CAN ******************
[env:project_esp32_can]
extends = env:esp32_base
build_flags =
  ${env:esp32_base.build_flags}
; libraries
lib_deps =
  JSONHandler=bblanchon/ArduinoJson@^7.1.0
build_src_filter =
  -<*>
  +<main_esp32_can.cpp>

;****************** ENV:NATIVE_TEST ******************
[env:native_test]
platform = native
framework =
test_framework = custom
build_src_filter =
  -<*>
  +<main_native.cpp>
check_src_filters = +<src/> +<lib/> +<test/>
build_flags =
  -std=c++17
  '-D MQTT_MAX_PACKET_SIZE=1024'
  '-D BUILD_ENV_NAME="native_test"'
  '-D GIT_COMMIT_COUNT=0'
  '-D GIT_COMMIT_HASH=0'
  '-D GIT_DIRTY=0'
  '-D PROGRAM_MEMORY_SIZE=32256'
  '-D NATIVE_TEST'                          ; exposes FileName paths (common.hpp) for host config tests
  -Wall
  -Wextra
  -Werror
lib_deps =
  bblanchon/ArduinoJson@^7.1.0             ; configHandler JSON parsing (header-only, host-compatible)
lib_ldf_mode = chain
lib_extra_dirs = test/_shims
lib_ignore =
  resetHandler                             ; common.cpp conditionally includes resetHandler (ESP only); LDF follows it unconditionally
  SPIFlash                                 ; replaced by test/_shims/src/SPIFlash.h for native OTA tests
  CANDriver                                ; SPI/AVR-specific; canHandlerBase.hpp is tested without hardware CAN drivers
  RCSwitch                                 ; interrupt-driven RF lib; replaced by test/_shims/src/RCSwitch.h for rfHandler tests
  connectivity                             ; ESP-only MQTT/WiFi stack; shimmed for ambientSensor tests via Wire.h
  ds18b20Reader                            ; ESP-only (OneWire + DallasTemperature); replaced by test/_shims/src/ds18b20Reader.hpp
test_ignore =                              ; override base: run all native test suites