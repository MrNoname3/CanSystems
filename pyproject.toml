# Python tooling configuration. The project is firmware-first; these settings cover the
# auxiliary Python (ota/, scripts/, the custom test runner).
#
# ruff is used for LINTING only, enforced by the release gate (scripts/lint_check.py, run by
# release_check.py and in CI). `ruff format` is intentionally NOT run: it collapses the
# project's manually column-aligned trailing comments (it has no AlignTrailingComments option,
# unlike clang-format). The line-length below only applies if someone runs `ruff format` by hand.
[tool.ruff]
line-length = 120

# Default rule set (pyflakes F + pycodestyle E4/E7/E9); E501 line-length is not enabled.
[tool.ruff.lint.per-file-ignores]
# PlatformIO SCons build scripts: Import("env") injects names ruff cannot see, and the
# import of project helpers legitimately follows that call (so F821 + E402 are expected).
"scripts/elf_to_bin.py" = ["F821", "E402"]
"scripts/git_commit_info.py" = ["F821", "E402"]
"scripts/patch_elf2bin.py" = ["F821", "E402"]
"scripts/patch_new_lib.py" = ["F821", "E402"]

# Static type checking (run by scripts/typecheck_check.py, enforced in CI). Standard mode for
# now; intended to be tightened toward strict later. Scope is the production Python (the OTA tool
# + dev scripts). Excluded: the four SCons build scripts (Import("env") injects names pyright
# cannot see, same reason they are ruff per-file-ignored above) and ota/tests (the MQTT test
# fakes are monkeypatched onto typed attributes - revisit when tightening to strict). The OTA
# tool's third-party deps are resolved via the interpreter the runner passes with --pythonpath
# (ota/.venv locally, the CI interpreter in CI).
[tool.pyright]
include = ["ota", "scripts"]
exclude = [
    "**/.venv",
    "**/__pycache__",
    ".pio",
    "ota/tests",
    "scripts/elf_to_bin.py",
    "scripts/git_commit_info.py",
    "scripts/patch_elf2bin.py",
    "scripts/patch_new_lib.py",
]
typeCheckingMode = "standard"

# pytest unit tests for the OTA tool (run by scripts/pytest_check.py, enforced in CI).
[tool.pytest.ini_options]
testpaths = ["ota/tests"]
