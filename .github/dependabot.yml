# Dependabot opens grouped, weekly PRs (which you review and merge — nothing changes without
# approval; no auto-merge). Each PR runs the release gate, so you see green/red on the new
# versions before merging.
#
# Scoped to github-actions and pip. The pip ecosystem manages the pinned dev/CI tooling in
# requirements-dev.txt; ota/requirements.txt is unpinned (nothing to bump) and pyproject.toml
# has no [project] deps. PlatformIO platform/library deps (pinned exact in platformio.ini)
# have no Dependabot ecosystem at all — they stay manual.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]      # one combined PR for all action bumps, not one per action
    commit-message:
      prefix: ci

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      dev-tooling:
        patterns: ["*"]      # one combined PR for all dev-tooling bumps
    ignore:
      # clang-format is pinned to the VS Code cpptools bundled version on purpose, so the gate
      # never disagrees with format-on-save. Bumping it must stay manual and in lockstep with
      # the editor — Dependabot cannot know that constraint.
      - dependency-name: clang-format
    commit-message:
      prefix: chore(deps-dev)
