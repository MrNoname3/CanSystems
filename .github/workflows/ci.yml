name: CI

# Mirrors the local release gate (scripts/release_check.py), in the same order:
#   0. git working-tree check  (warning unless --strict)
#   1. pio run                 (build every default environment)
#   2. pio test -e native_test (native unit-test suite)
#   3. pio check --fail-on-defect (cppcheck + clang-tidy; any defect fails)

on:
  push:
    branches: ['**']        # every branch (not tags): immediate feedback on feature branches
  workflow_dispatch:        # allow manual runs from the Actions tab

concurrency:                # a newer push to the same ref cancels the in-flight run
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-gate:
    # GitHub-only on purpose: the Gitea runner is a low-power local box, not enabled yet.
    # Gitea also scans .github/workflows, so this guard makes the job skip there — the gate
    # runs only on github.com. (If Gitea is enabled later via .gitea/workflows/ci.yml, the
    # same guard also keeps the gate from running twice.)
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history so GIT_COMMIT_COUNT is correct)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # git_utils.py runs `git rev-list --count HEAD`; a shallow clone reports 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO toolchains and pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO + tooling
        # intelhex: the ESP32 esptool (tool-esptoolpy) imports it when creating the
        # bootloader/firmware .bin. It ships with neither PlatformIO nor the platform,
        # so a fresh runner must add it (it is present locally but missing in CI).
        # clang-format: the release gate's format step (scripts/format_check.py). Pinned
        # to the VS Code cpptools version so the gate never disagrees with format-on-save.
        # ruff: the gate's lint step (scripts/lint_check.py) over the Python sources.
        # pytest + ota deps: the gate's pytest step (scripts/pytest_check.py) imports otaUpdate,
        # which needs paho-mqtt/pyyaml/tqdm (ota/requirements.txt).
        run: pip install --upgrade platformio intelhex clang-format==22.1.3 ruff==0.15.17 pytest==9.1.0 -r ota/requirements.txt

      - name: Release gate (build all envs + native tests + static analysis)
        run: python scripts/release_check.py

  size-diff:
    # Informational firmware flash/RAM delta vs a baseline (merge-base with master, or the
    # previous commit when pushing master). continue-on-error: it never blocks — the
    # release-gate job is the source of truth for build health; this only reports sizes.
    if: ${{ github.server_url == 'https://github.com' }}
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history so the baseline commit can be built)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO toolchains and pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO + intelhex
        run: pip install --upgrade platformio intelhex   # intelhex: ESP32 esptool needs it (see release-gate)

      - name: Determine baseline commit
        id: base
        run: |
          git fetch --no-tags --prune origin master
          if [ "$GITHUB_REF_NAME" = master ]; then
            base=$(git rev-parse HEAD^)              # delta of this push to master
          else
            base=$(git merge-base HEAD origin/master) # delta the branch adds vs master
          fi
          echo "commit=$base" >> "$GITHUB_OUTPUT"

      - name: Firmware size diff vs baseline
        # size_compare.py builds the baseline in a temp worktree, then the current tree, and
        # prints a per-env flash/RAM table (native_test has no size data and is skipped).
        run: |
          python scripts/size_compare.py --commit "${{ steps.base.outputs.commit }}" | tee /tmp/size.log
          {
            echo "## Firmware size vs \`${{ steps.base.outputs.commit }}\`"
            echo '```'
            sed -n '/Size comparison:/,$p' /tmp/size.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  coverage:
    # Informational native-test line coverage over lib/ (gcovr); continue-on-error, never blocks.
    # Reports all of lib/ — the headline is pulled down by vendored third-party code (notably
    # lib/dfPlayer/.../DFPlayerMiniFast.cpp); add a gcovr --exclude for a cleaner own-code number.
    if: ${{ github.server_url == 'https://github.com' }}
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO toolchains and pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Install PlatformIO + gcovr
        run: pip install --upgrade platformio gcovr

      - name: Native tests with coverage instrumentation
        run: PLATFORMIO_BUILD_FLAGS="-lgcov --coverage" pio test -e native_test

      - name: Coverage report (lib/)
        # Pretty markdown table in the summary, plus a collapsible plain-text report whose
        # "Missing" column lists the uncovered line ranges per file (the markdown format omits
        # those). gcovr's INFO logs go to stderr, so only the report bodies reach the summary.
        run: |
          gcovr --root . --filter 'lib/' --markdown | tee -a "$GITHUB_STEP_SUMMARY"
          {
            echo ""
            echo "<details>"
            echo "<summary>Uncovered lines (per file)</summary>"
            echo ""
            echo '```text'
            gcovr --root . --filter 'lib/'
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
